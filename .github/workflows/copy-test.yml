name: Audio Visual Generation

on:
  workflow_dispatch:
    inputs:
      concept:
        description: 'Audio visual concept (e.g., "Cyberpunk city night, electronic")'
        required: true
        type: string
        default: 'Cyberpunk city night, electronic'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create unique branch
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_CONCEPT=$(echo "${{ github.event.inputs.concept }}" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-20)
          BRANCH_NAME="av/${SAFE_CONCEPT}-${TIMESTAMP}"
          FOLDER_NAME="audio-visual/${TIMESTAMP}-${SAFE_CONCEPT}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH_NAME, Folder: $FOLDER_NAME"
