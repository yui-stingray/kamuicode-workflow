name: Media Synthesis

on:
  workflow_dispatch:
    inputs:
      concept:
        description: 'Media concept (e.g., "Cyberpunk city night, electronic")'
        required: true
        type: string
        default: 'Cyberpunk city night, electronic'

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create unique branch
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_CONCEPT=$(echo "${{ github.event.inputs.concept }}" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-20)
          BRANCH_NAME="ms/${SAFE_CONCEPT}-${TIMESTAMP}"
          FOLDER_NAME="media-synthesis/${TIMESTAMP}-${SAFE_CONCEPT}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create and push branch
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"
          
          echo "✅ Branch created successfully: $BRANCH_NAME"

  planning:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      sound_strategy: ${{ steps.plan.outputs.sound_strategy }}
      visual_strategy: ${{ steps.plan.outputs.visual_strategy }}
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          pip install google-cloud-aiplatform google-auth requests

      - name: Create Content Strategy
        id: plan
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          mkdir -p "$FOLDER_NAME/planning"
          
          CONCEPT="${{ github.event.inputs.concept }}"
          
          # Create strategy using Python script
          cat > strategy_generator.py << 'EOF'
import json
import sys
import os

concept = sys.argv[1] if len(sys.argv) > 1 else "Electronic media"

# Create sound strategy
sound_strategy = {
    "genre": "Electronic/Ambient",
    "tempo": "120 BPM",
    "mood": "Atmospheric, energetic",
    "duration": 30,
    "structure": {
        "intro": "0-5s",
        "main": "5-25s",
        "outro": "25-30s"
    },
    "prompt": f"Create a 30-second {concept} track with atmospheric sounds and rhythmic elements"
}

# Create visual strategy
visual_strategy = {
    "scenes": [
        {
            "index": 0,
            "timing": "0-10s",
            "description": f"Opening scene for {concept}",
            "image_prompt": f"{concept} opening scene, highly detailed, cinematic style",
            "style": "Cinematic"
        },
        {
            "index": 1,
            "timing": "10-20s", 
            "description": f"Dynamic scene for {concept}",
            "image_prompt": f"{concept} dynamic scene with movement and energy",
            "style": "Dynamic"
        },
        {
            "index": 2,
            "timing": "20-30s",
            "description": f"Conclusion scene for {concept}", 
            "image_prompt": f"{concept} finale scene, epic and atmospheric",
            "style": "Epic"
        }
    ]
}

print("SOUND_STRATEGY:" + json.dumps(sound_strategy))
print("VISUAL_STRATEGY:" + json.dumps(visual_strategy))
EOF

          python strategy_generator.py "$CONCEPT" > strategy_output.txt
          
          # Parse output
          SOUND_STRATEGY=$(grep "SOUND_STRATEGY:" strategy_output.txt | cut -d: -f2-)
          VISUAL_STRATEGY=$(grep "VISUAL_STRATEGY:" strategy_output.txt | cut -d: -f2-)
          
          # Save strategies
          echo "$SOUND_STRATEGY" > "$FOLDER_NAME/planning/sound-strategy.json"
          echo "$VISUAL_STRATEGY" > "$FOLDER_NAME/planning/visual-strategy.json"
          
          echo "sound_strategy=$SOUND_STRATEGY" >> $GITHUB_OUTPUT
          echo "visual_strategy=$VISUAL_STRATEGY" >> $GITHUB_OUTPUT
          
          echo "✅ Strategies created successfully"

      - name: Commit Planning Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull origin ${{ needs.setup.outputs.branch-name }} || echo "No remote changes"
          git add -f ${{ needs.setup.outputs.folder-name }}/planning/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Create media synthesis strategy"
            git push origin ${{ needs.setup.outputs.branch-name }}
          fi

  sound-generation:
    runs-on: ubuntu-latest
    needs: [setup, planning]
    outputs:
      sound_file_path: ${{ steps.sound.outputs.sound_file_path }}
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq
          pip install google-cloud-aiplatform google-auth requests

      - name: Generate Sound with Vertex AI
        id: sound
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          SOUND_DIR="$FOLDER_NAME/sound"
          mkdir -p "$SOUND_DIR"
          
          # Get sound strategy
          SOUND_STRATEGY='${{ needs.planning.outputs.sound_strategy }}'
          SOUND_PROMPT=$(echo "$SOUND_STRATEGY" | jq -r '.prompt')
          DURATION=$(echo "$SOUND_STRATEGY" | jq -r '.duration')
          
          echo "Generating sound with Vertex AI..."
          echo "Prompt: $SOUND_PROMPT"
          echo "Duration: ${DURATION}s"
          
          # Create Python script for Vertex AI sound generation
          cat > sound_generator.py << 'EOF'
import os
import json
import sys
import tempfile
import requests
import subprocess
from google.oauth2 import service_account
from google.auth.transport.requests import Request

def generate_sound_with_vertex_ai(prompt, duration=30):
    """Try to generate sound using Vertex AI"""
    
    creds_json = os.environ.get('GOOGLE_APPLICATION_CREDENTIALS_JSON')
    project_id = os.environ.get('GOOGLE_CLOUD_PROJECT')
    
    if creds_json and project_id:
        try:
            with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
                f.write(creds_json)
                creds_file = f.name
            
            credentials = service_account.Credentials.from_service_account_file(creds_file)
            credentials.refresh(Request())
            
            # Try Vertex AI endpoint for music generation (Lyria)
            endpoint = f"https://us-central1-aiplatform.googleapis.com/v1/projects/{project_id}/locations/us-central1/publishers/google/models/lyria-v1:predict"
            
            headers = {
                "Authorization": f"Bearer {credentials.token}",
                "Content-Type": "application/json"
            }
            
            payload = {
                "instances": [{
                    "prompt": prompt,
                    "duration": duration
                }]
            }
            
            response = requests.post(endpoint, headers=headers, json=payload, timeout=300)
            
            if response.status_code == 200:
                print("SUCCESS: Vertex AI Lyria")
                return response.json()
            else:
                print(f"Vertex AI Lyria not available: {response.status_code}")
                
        except Exception as e:
            print(f"Vertex AI failed: {e}")
    
    return None

def create_enhanced_fallback_sound(prompt, duration, output_file):
    """Create an enhanced sound file based on the prompt"""
    
    # Analyze prompt for musical characteristics
    prompt_lower = prompt.lower()
    
    # Base frequency selection based on prompt
    if "electronic" in prompt_lower or "cyber" in prompt_lower:
        freqs = [220, 330, 440, 660]  # Electronic-like frequencies
        effects = "highpass=f=100,lowpass=f=8000"
    elif "ambient" in prompt_lower or "atmospheric" in prompt_lower:
        freqs = [110, 165, 220, 330]  # Lower, ambient frequencies
        effects = "highpass=f=50,lowpass=f=4000"
    elif "night" in prompt_lower or "dark" in prompt_lower:
        freqs = [88, 132, 176, 264]  # Darker, lower frequencies
        effects = "highpass=f=60,lowpass=f=3000"
    else:
        freqs = [220, 330, 440, 550]  # Default frequencies
        effects = "highpass=f=80,lowpass=f=6000"
    
    # Create multiple oscillators with rhythm
    oscillators = []
    for i, freq in enumerate(freqs):
        # Add some rhythm variation
        volume = 0.3 - (i * 0.05)  # Decreasing volume for higher frequencies
        # Add slight frequency modulation for more interesting sound
        mod_freq = freq * 0.1  # Modulation frequency
        osc = f"sine=frequency={freq}:duration={duration}"
        oscillators.append(f"[{i}]{osc}[osc{i}]")
    
    # Build complex filter chain
    filter_complex = ";".join(oscillators)
    filter_complex += f";[osc0][osc1][osc2][osc3]amix=inputs=4:duration=longest:dropout_transition=0.2[mixed]"
    filter_complex += f";[mixed]{effects}[final]"
    
    cmd = [
        "ffmpeg", "-f", "lavfi", "-i", "anullsrc=channel_layout=stereo:sample_rate=44100",
        "-filter_complex", filter_complex,
        "-map", "[final]", "-c:a", "pcm_s16le", "-ar", "44100", "-t", str(duration),
        output_file, "-y"
    ]
    
    try:
        result = subprocess.run(cmd, capture_output=True, check=True, text=True)
        return True
    except subprocess.CalledProcessError as e:
        print(f"Enhanced fallback failed: {e}")
        # Simple fallback
        simple_cmd = [
            "ffmpeg", "-f", "lavfi", "-i", f"sine=frequency=440:duration={duration}",
            "-c:a", "pcm_s16le", output_file, "-y"
        ]
        try:
            subprocess.run(simple_cmd, capture_output=True, check=True)
            return True
        except:
            return False

if __name__ == "__main__":
    prompt = sys.argv[1] if len(sys.argv) > 1 else "Electronic sound"
    duration = int(sys.argv[2]) if len(sys.argv) > 2 else 30
    output_file = "generated-sound.wav"
    
    print(f"Generating sound for: {prompt}")
    
    # Try Vertex AI first
    result = generate_sound_with_vertex_ai(prompt, duration)
    
    if result:
        print("✅ Vertex AI sound generation successful")
        # TODO: Extract and save sound file from API response
        print("Note: File extraction from API response needs implementation")
        # For now, create fallback
        create_enhanced_fallback_sound(prompt, duration, output_file)
    else:
        print("Using enhanced fallback sound generation...")
        if create_enhanced_fallback_sound(prompt, duration, output_file):
            print("✅ Enhanced fallback sound created")
        else:
            print("❌ All sound generation methods failed")
            sys.exit(1)
EOF

          # Generate sound
          python sound_generator.py "$SOUND_PROMPT" "$DURATION"
          
          SOUND_FILE_PATH="$SOUND_DIR/generated-sound.wav"
          
          if [ -f "generated-sound.wav" ]; then
            mv "generated-sound.wav" "$SOUND_FILE_PATH"
            echo "✅ Sound file created"
          else
            echo "❌ Sound generation failed"
            exit 1
          fi
          
          # Verify sound file
          if [ -f "$SOUND_FILE_PATH" ] && [ -s "$SOUND_FILE_PATH" ]; then
            DURATION_CHECK=$(ffprobe -i "$SOUND_FILE_PATH" -show_entries format=duration -v quiet -of csv="p=0" 2>/dev/null | cut -d. -f1)
            SIZE=$(du -h "$SOUND_FILE_PATH" | cut -f1)
            echo "Sound file: $SIZE, Duration: ${DURATION_CHECK:-unknown}s"
            echo "sound_file_path=$SOUND_FILE_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ Sound file verification failed"
            exit 1
          fi

      - name: Commit Sound Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull origin ${{ needs.setup.outputs.branch-name }} --rebase || echo "No remote changes"
          git add -f ${{ needs.setup.outputs.folder-name }}/sound/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate sound with Vertex AI"
            git push origin ${{ needs.setup.outputs.branch-name }}
          fi

  image-generation:
    runs-on: ubuntu-latest
    needs: [setup, planning]
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick curl jq
          pip install google-cloud-aiplatform google-auth requests pillow

      - name: Generate Images with Vertex AI
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          IMAGE_DIR="$FOLDER_NAME/images"
          mkdir -p "$IMAGE_DIR"
          
          # Get visual strategy
          VISUAL_STRATEGY='${{ needs.planning.outputs.visual_strategy }}'
          
          # Create Python script for Vertex AI image generation
          cat > image_generator.py << 'EOF'
import os
import json
import sys
import tempfile
import requests
import base64
from google.oauth2 import service_account
from google.auth.transport.requests import Request
from PIL import Image
import io

def generate_image_with_vertex_ai(prompt, output_path):
    """Generate image using Vertex AI Imagen"""
    
    creds_json = os.environ.get('GOOGLE_APPLICATION_CREDENTIALS_JSON')
    project_id = os.environ.get('GOOGLE_CLOUD_PROJECT')
    
    if creds_json and project_id:
        try:
            with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
                f.write(creds_json)
                creds_file = f.name
            
            credentials = service_account.Credentials.from_service_account_file(creds_file)
            credentials.refresh(Request())
            
            # Vertex AI endpoint for image generation
            endpoint = f"https://us-central1-aiplatform.googleapis.com/v1/projects/{project_id}/locations/us-central1/publishers/google/models/imagen-3.0-fast-generate-001:predict"
            
            headers = {
                "Authorization": f"Bearer {credentials.token}",
                "Content-Type": "application/json"
            }
            
            payload = {
                "instances": [{
                    "prompt": prompt,
                    "sampleCount": 1,
                    "width": 1024,
                    "height": 576,
                    "seed": 42
                }],
                "parameters": {
                    "sampleCount": 1
                }
            }
            
            response = requests.post(endpoint, headers=headers, json=payload, timeout=120)
            
            if response.status_code == 200:
                result = response.json()
                if "predictions" in result and len(result["predictions"]) > 0:
                    image_data = result["predictions"][0]["bytesBase64Encoded"]
                    image_bytes = base64.b64decode(image_data)
                    
                    # Save image
                    with open(output_path, 'wb') as f:
                        f.write(image_bytes)
                    
                    return True
            else:
                print(f"API Error: {response.status_code} - {response.text}")
                
        except Exception as e:
            print(f"Request failed: {e}")
    
    return False

def create_enhanced_fallback_image(prompt, output_path, index):
    """Create enhanced fallback placeholder image"""
    colors = ["#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FECA57", "#DDA0DD"]
    color = colors[index % len(colors)]
    
    # Create gradient background
    img = Image.new('RGB', (1024, 576), color)
    
    # Add some visual interest with gradient
    pixels = img.load()
    for i in range(1024):
        for j in range(576):
            # Create subtle gradient
            r, g, b = img.getpixel((i, j))
            factor = (i + j) / (1024 + 576)
            r = int(r * (0.8 + 0.4 * factor))
            g = int(g * (0.8 + 0.4 * factor))
            b = int(b * (0.8 + 0.4 * factor))
            pixels[i, j] = (min(255, r), min(255, g), min(255, b))
    
    img.save(output_path, 'PNG')
    return True

if __name__ == "__main__":
    scenes_json = sys.argv[1]
    output_dir = sys.argv[2]
    
    scenes = json.loads(scenes_json)
    
    for scene in scenes["scenes"]:
        index = scene["index"]
        prompt = scene["image_prompt"]
        output_path = f"{output_dir}/segment-{index}.png"
        
        print(f"Generating image {index}: {prompt[:50]}...")
        
        # Try Vertex AI Imagen
        if generate_image_with_vertex_ai(prompt, output_path):
            print(f"✅ Image {index} generated with Vertex AI Imagen")
        else:
            print(f"Using enhanced fallback for image {index}")
            create_enhanced_fallback_image(prompt, output_path, index)
            print(f"✅ Enhanced fallback image {index} created")
EOF

          # Generate images
          python image_generator.py "$VISUAL_STRATEGY" "$IMAGE_DIR"
          
          # Verify images
          CREATED_COUNT=$(ls -1 "$IMAGE_DIR"/segment-*.png 2>/dev/null | wc -l)
          echo "Created $CREATED_COUNT image files"

      - name: Commit Image Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull origin ${{ needs.setup.outputs.branch-name }} --rebase || echo "No remote changes"
          git add -f ${{ needs.setup.outputs.folder-name }}/images/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate images with Vertex AI Imagen"
            git push origin ${{ needs.setup.outputs.branch-name }}
          fi

  content-generation:
    runs-on: ubuntu-latest
    needs: [setup, planning, image-generation]
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq
          pip install requests google-auth

      - name: Generate Content from Images
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          CONTENT_DIR="$FOLDER_NAME/content"
          mkdir -p "$CONTENT_DIR"
          
          echo "Creating content from images..."
          
          # Create content using FFmpeg
          for IMAGE_FILE in $FOLDER_NAME/images/segment-*.png; do
            if [ ! -f "$IMAGE_FILE" ]; then
              continue
            fi
            
            BASENAME=$(basename "$IMAGE_FILE" .png)
            INDEX=${BASENAME#segment-}
            CONTENT_PATH="$CONTENT_DIR/segment-$INDEX.mp4"
            
            echo "Creating content for scene $INDEX..."
            
            # Create 10-second content with enhanced zoom effect
            if ffmpeg -loop 1 -i "$IMAGE_FILE" \
              -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,zoompan=z='min(zoom+0.001,1.2)':d=300:x=iw/2-(iw/zoom/2):y=ih/2-(ih/zoom/2),fade=t=in:st=0:d=1,fade=t=out:st=9:d=1" \
              -c:v libx264 -t 10 -pix_fmt yuv420p -r 30 \
              "$CONTENT_PATH" -y 2>/dev/null; then
              echo "✅ Content $INDEX created successfully"
            else
              echo "✗ Failed to create content $INDEX"
            fi
          done
          
          CREATED_COUNT=$(ls -1 "$CONTENT_DIR"/segment-*.mp4 2>/dev/null | wc -l)
          echo "Created $CREATED_COUNT content files"

      - name: Commit Content Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull origin ${{ needs.setup.outputs.branch-name }} --rebase || echo "No remote changes"
          git add -f ${{ needs.setup.outputs.folder-name }}/content/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate content from images"
            git push origin ${{ needs.setup.outputs.branch-name }}
          fi

  final-assembly:
    runs-on: ubuntu-latest
    needs: [setup, sound-generation, content-generation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Assemble Final Media
        id: assemble
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          SOUND_FILE_PATH="${{ needs.sound-generation.outputs.sound_file_path }}"
          CONTENT_DIR="$FOLDER_NAME/content"
          FINAL_DIR="$FOLDER_NAME/final"
          FINAL_MEDIA_PATH="$FINAL_DIR/final-media-synthesis.mp4"
          mkdir -p "$FINAL_DIR"

          echo "Assembling final media synthesis..."
          
          # Create concatenation list
          cd "$CONTENT_DIR"
          find . -name "segment-*.mp4" | sort -V | sed "s|^./|file '|" | sed "s|$|'|" > concat_list.txt
          
          echo "Content files to concatenate:"
          cat concat_list.txt
          
          # Concatenate content
          if ffmpeg -y -f concat -safe 0 -i concat_list.txt -c copy concatenated.mp4; then
            echo "✅ Content concatenated successfully"
          else
            echo "::error::Content concatenation failed"
            exit 1
          fi
          
          cd - > /dev/null
          
          # Add sound
          if [ -f "$SOUND_FILE_PATH" ] && [ -s "$SOUND_FILE_PATH" ]; then
            echo "Adding sound to content..."
            if ffmpeg -y -i "$CONTENT_DIR/concatenated.mp4" -i "$SOUND_FILE_PATH" \
              -c:v copy -c:a aac -b:a 192k -shortest "$FINAL_MEDIA_PATH"; then
              echo "✅ Final media synthesis created successfully"
            else
              echo "::error::Sound integration failed"
              exit 1
            fi
          else
            echo "No sound file found, creating content-only version"
            cp "$CONTENT_DIR/concatenated.mp4" "$FINAL_MEDIA_PATH"
          fi
          
          # Verify final media
          if [ -f "$FINAL_MEDIA_PATH" ] && [ -s "$FINAL_MEDIA_PATH" ]; then
            DURATION=$(ffprobe -i "$FINAL_MEDIA_PATH" -show_entries format=duration -v quiet -of csv="p=0" 2>/dev/null | cut -d. -f1)
            SIZE=$(du -h "$FINAL_MEDIA_PATH" | cut -f1)
            echo "Final media: $SIZE, Duration: ${DURATION:-unknown}s"
            echo "final_media_path=$FINAL_MEDIA_PATH" >> $GITHUB_OUTPUT
          else
            echo "::error::Final media creation failed"
            exit 1
          fi

      - name: Commit Final Media
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git pull origin ${{ needs.setup.outputs.branch-name }} --rebase || echo "No remote changes"
          git add -f ${{ needs.setup.outputs.folder-name }}/final/
          git add -f ${{ needs.setup.outputs.folder-name }}/content/concatenated.mp4
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Assemble final media synthesis"
            git push origin ${{ needs.setup.outputs.branch-name }}
          fi

  create-pr:
    runs-on: ubuntu-latest
    needs: [setup, final-assembly]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ needs.setup.outputs.branch-name }}
        run: |
          PR_BODY=$(cat <<EOF
          🎬 **Media Synthesis Complete!**

          This pull request contains a complete media synthesis generated from the concept: **"${{ github.event.inputs.concept }}"**

          ## 🎭 Generated Content
          
          ### 📁 Structure
          - **🔊 Sound**: Generated with Vertex AI (Lyria)
