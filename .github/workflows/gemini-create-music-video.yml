name: Gemini-Native Create Music Video

on:
  workflow_dispatch:
    inputs:
      lyrics:
        description: '歌詞 (各行は改行で区切ってください)'
        required: true
        type: string
      style:
        description: '音楽と画像の全体的なスタイル (例: 水彩画風, アニメ, サイバーパンク)'
        required: true
        type: string
      tempo:
        description: '音楽のテンポ (例: スロー, 80 BPM, アップビート)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create unique branch and folder
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_STYLE=$(echo "${{ github.event.inputs.style }}" | sed 's/[^a-zA-Z0-9]/-/g')
          BRANCH_NAME="mv/${SAFE_STYLE}-${TIMESTAMP}"
          FOLDER_NAME="music-videos/${TIMESTAMP}-${SAFE_STYLE}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

  plan:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      plan-path: ${{ steps.gemini-plan.outputs.plan_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "Bash(curl:*)",
                "Bash(wget:*)",
                "Bash(sleep:*)",
                "Bash(stat:*)",
                "Bash(find:*)",
                "Bash(ls:*)",
                "Bash(cat:*)",
                "Bash(head:*)",
                "Bash(mkdir:*)",
                "Bash(git:checkout:*)",
                "Bash(git:config:*)",
                "Bash(git:push:*)",
                "Bash(git:add:*)",
                "Bash(git:diff:*)",
                "Bash(git:commit:*)",
                "Bash(git:pull:*)",
                "Bash(date:*)",
                "Bash(jq:*)",
                "Bash(tr:*)",
                "Bash(wc:*)",
                "Bash(echo:*)",
                "Bash(npx:*)",
                "Bash(open:*)",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
                "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
                "mcp__r2v-fal-vidu-q1__vidu_q1_status",
                "mcp__r2v-fal-vidu-q1__vidu_q1_result",
                "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
                "mcp__t2v-fal-veo3-fast__veo3_fast_status",
                "mcp__t2v-fal-veo3-fast__veo3_fast_result",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
                "mcp__t2m-google-lyria__lyria_generate"
              ]
            },
            "coreTools": [
              "ReadFileTool",
              "WriteFileTool",
              "EditFileTool",
              "ShellTool",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
              "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
              "mcp__r2v-fal-vidu-q1__vidu_q1_status",
              "mcp__r2v-fal-vidu-q1__vidu_q1_result",
              "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
              "mcp__t2v-fal-veo3-fast__veo3_fast_status",
              "mcp__t2v-fal-veo3-fast__veo3_fast_result",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
              "mcp__t2m-google-lyria__lyria_generate"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Run Gemini Creative Director Agent
        id: gemini-plan
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたはミュージックビデオのクリエイティブディレクターAIです。
            提供された情報に基づき、詳細な制作計画を**単一のJSONオブジェクト**として出力してください。
            **入力:**
            - 歌詞: "${{ github.event.inputs.lyrics }}"
            - スタイル: "${{ github.event.inputs.style }}"
            - テンポ: "${{ github.event.inputs.tempo }}"
            **タスク:**
            1. 音楽生成(Lyria)用の詳細なプロンプトを作成してください。
            2. 歌詞を分析し、各行に対応する画像生成(Imagen)用の創造的なプロンプトを作成してください。
            3. 全ての計画を、以下の構造を持つJSONとして、`${{ needs.setup.outputs.folder-name }}/production_plan.json` ファイルに保存してください。
            **JSON構造:**
            ```json
            {
              "music_prompt": "A gentle, melancholic piano melody, slow tempo, with subtle string undertones, evoking a sense of nostalgic anime.",
              "scenes": [
                { "lyrics": "一番星、夜空に光る。", "image_prompt": "A breathtakingly beautiful anime-style illustration of a single, brilliant first star appearing in a deep indigo twilight sky." },
                { "lyrics": "君との思い出、心に灯る。", "image_prompt": "A warm, nostalgic anime scene. Two figures on a hill looking at the starry sky, a gentle light emanating from their hearts." }
              ]
            }
            ```
            **重要:** 必ず `production_plan.json` を作成し、その絶対パスを `plan_path` という名前で出力してください。
      - name: Commit production plan
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(plan): 📋 Create music video production plan"
          git push

  generate-assets:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    outputs:
      music-file: ${{ steps.generate-assets-agent.outputs.music_file }}
      image-files: ${{ steps.generate-assets-agent.outputs.image_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "Bash(curl:*)",
                "Bash(wget:*)",
                "Bash(sleep:*)",
                "Bash(stat:*)",
                "Bash(find:*)",
                "Bash(ls:*)",
                "Bash(cat:*)",
                "Bash(head:*)",
                "Bash(mkdir:*)",
                "Bash(git:checkout:*)",
                "Bash(git:config:*)",
                "Bash(git:push:*)",
                "Bash(git:add:*)",
                "Bash(git:diff:*)",
                "Bash(git:commit:*)",
                "Bash(git:pull:*)",
                "Bash(date:*)",
                "Bash(jq:*)",
                "Bash(tr:*)",
                "Bash(wc:*)",
                "Bash(echo:*)",
                "Bash(npx:*)",
                "Bash(open:*)",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
                "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
                "mcp__r2v-fal-vidu-q1__vidu_q1_status",
                "mcp__r2v-fal-vidu-q1__vidu_q1_result",
                "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
                "mcp__t2v-fal-veo3-fast__veo3_fast_status",
                "mcp__t2v-fal-veo3-fast__veo3_fast_result",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
                "mcp__t2m-google-lyria__lyria_generate"
              ]
            },
            "coreTools": [
              "ReadFileTool",
              "WriteFileTool",
              "EditFileTool",
              "ShellTool",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
              "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
              "mcp__r2v-fal-vidu-q1__vidu_q1_status",
              "mcp__r2v-fal-vidu-q1__vidu_q1_result",
              "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
              "mcp__t2v-fal-veo3-fast__veo3_fast_status",
              "mcp__t2v-fal-veo3-fast__veo3_fast_result",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
              "mcp__t2m-google-lyria__lyria_generate"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Run Gemini Asset Generation Agent
        id: generate-assets-agent
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたはマルチメディア生成AIです。
            提供された制作計画JSONファイル (`${{ needs.plan.outputs.plan_path }}`) に基づいて、音楽と**すべての画像**を生成してください。
            **タスク:**
            1.  `ReadFileTool` を使って `${{ needs.plan.outputs.plan_path }}` の内容を読み込み、JSONをパースしてください。
            2.  `music_prompt` の値を使って `lyria_generate` ツールを実行し、音楽を生成してください。
                *   生成リクエストの `request_id` を取得し、`t2m-google-lyria__lyria_status` で完了をポーリングしてください。
                *   完了後、`t2m-google-lyria__lyria_result` ツールを使って、`${{ needs.setup.outputs.folder-name }}` を `output_directory` として指定し、音楽ファイルをダウンロードしてください。**このツールの戻り値から、実際に保存された音楽ファイルの絶対パスを取得してください。**
            3.  `scenes` 配列を**ループ処理**してください。各シーンについて:
                a. `image_prompt` の値を使って `mcp__t2i-fal-imagen4-fast__imagen4_fast_submit` ツールを実行し、画像を生成してください。
                *   生成リクエストの `request_id` を取得し、`mcp__t2i-fal-imagen4-fast__imagen4_fast_status` で完了をポーリングしてください。
                *   完了後、`mcp__t2i-fal-imagen4-fast__imagen4_fast_result` ツールを使って、`${{ needs.setup.outputs.folder-name }}` を `output_directory` として指定し、画像をダウンロードしてください。**このツールの戻り値から、実際に保存された画像の絶対パスを取得してください。**
                *   ダウンロードされた画像のパスをリストに追加してください。
            4.  すべてのタスクが完了したら、生成された音楽ファイルと画像ファイルの**実際の絶対パスのリスト**を含むJSONオブジェクトを**標準出力にのみ**出力してください。**余計な会話や説明は一切含めないでください。**

            **出力JSON構造:**
            ```json
            {
              "music_file": "music-videos/YYYYMMDD-HHMMSS-STYLE/actual_music_filename.wav",
              "image_files": [
                "music-videos/YYYYMMDD-HHMMSS-STYLE/actual_image_0.png",
                "music-videos/YYYYMMSS-STYLE/actual_image_1.png"
              ]
            }
            ```
            **重要:** `music_file` と `image_files` には、**実際にファイルが保存された絶対パス**を正確に含めてください。
      - name: Commit generated assets
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          
          # Get the raw output from the agent step
          AGENT_RAW_OUTPUT="${{ steps.generate-assets-agent.outputs.gemini_result }}"
          echo "Raw agent output: $AGENT_RAW_OUTPUT" # For debugging

          # Extract the JSON block from the agent's output
          # Assuming the JSON is enclosed in ```json ... ```
          JSON_OUTPUT=$(echo "$AGENT_RAW_OUTPUT" | sed -n '/```json/,/```/p' | grep -v '```')

          echo "Extracted JSON: $JSON_OUTPUT" # For debugging

          # Attempt to parse the JSON output
          if echo "$JSON_OUTPUT" | jq -e '.' > /dev/null; then
              AGENT_OUTPUT=$(echo "$JSON_OUTPUT" | jq -r '.')
              MUSIC_FILE=$(echo "$AGENT_OUTPUT" | jq -r '.music_file')
              # Use a loop to handle multiple image files, ensuring each is quoted
              IMAGE_FILES_ARRAY=()
              while IFS= read -r line; do
                  IMAGE_FILES_ARRAY+=("$line")
              done < <(echo "$AGENT_OUTPUT" | jq -r '.image_files[]')

              echo "Parsed Music File: $MUSIC_FILE"
              echo "Parsed Image Files: ${IMAGE_FILES_ARRAY[@]}"

              # Add the generated files to Git
              if [ -n "$MUSIC_FILE" ]; then
                  git add "$MUSIC_FILE"
              else
                  echo "Warning: Music file path is empty. Skipping git add for music file."
              fi

              for img_file in "${IMAGE_FILES_ARRAY[@]}"; do
                if [ -n "$img_file" ]; then
                    git add "$img_file"
                else
                    echo "Warning: Empty image file path found. Skipping git add for this image."
                fi
              done

              # Check if there are any changes to commit
              if ! git diff --cached --exit-code; then
                  git commit -m "feat(assets): 🎨 Generate music and image assets"
                  git push
              else
                  echo "No changes to commit after asset generation."
              fi
          else
              echo "Error: Extracted content is not valid JSON or is empty. Cannot commit generated assets."
              echo "Extracted content: $JSON_OUTPUT"
              exit 1 # Fail the job if JSON parsing fails
          fi

  assemble:
    runs-on: ubuntu-latest
    needs: [setup, generate-assets]
    outputs:
      final-video-path: ${{ steps.assemble-video.outputs.final_video_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      - name: Setup FFmpeg and SoX
        run: sudo apt-get update && sudo apt-get install -y ffmpeg sox
      - name: Get music duration and image count
        id: get-assets-info
        run: |
          # Use the actual paths from the generate-assets job's outputs
          MUSIC_PATH="${{ needs.generate-assets.outputs.music-file }}"
          IMAGE_FILES_STR="${{ needs.generate-assets.outputs.image-files }}"

          # Convert space-separated string to array for counting
          # Note: The output from `jq -r '.image_files[]'` will be newline-separated, not space-separated.
          # Adjusting IFS to handle newline separation.
          IFS=$'\n' read -d '' -r -a IMAGE_FILES_ARRAY <<< "$IMAGE_FILES_STR"
          NUM_IMAGES=${#IMAGE_FILES_ARRAY[@]}

          # Ensure MUSIC_PATH is not empty before calling soxi
          if [ -z "$MUSIC_PATH" ]; then
              echo "Error: Music file path is empty. Cannot get music duration."
              exit 1
          fi
          MUSIC_DURATION=$(soxi -D "$MUSIC_PATH")

          echo "music_duration=$MUSIC_DURATION" >> $GITHUB_OUTPUT
          echo "num_images=$NUM_IMAGES" >> $GITHUB_OUTPUT
          echo "image_files_str=$IMAGE_FILES_STR" >> $GITHUB_OUTPUT # Pass through for next step
      - name: Assemble final video
        id: assemble-video
        run: |
          MUSIC_DURATION=${{ steps.get-assets-info.outputs.music_duration }}
          NUM_IMAGES=${{ steps.get-assets-info.outputs.num_images }}
          IMAGE_FILES_STR="${{ steps.get-assets-info.outputs.image_files_str }}"

          # Convert newline-separated string back to array
          IFS=$'\n' read -d '' -r -a IMAGE_FILES_ARRAY <<< "$IMAGE_FILES_STR"

          if (( NUM_IMAGES == 0 )); then
              echo "Error: No images found to assemble the video."
              exit 1
          fi

          IMAGE_DURATION=$(echo "scale=4; $MUSIC_DURATION / $NUM_IMAGES" | bc)
          CROSSFADE_DURATION=1 # 1 second crossfade

          FILTER_COMPLEX_STR=""
          INPUT_FILES=""
          CURRENT_OFFSET=0

          for ((i=0; i<NUM_IMAGES; i++)); do
              INPUT_FILES+="-i \"${IMAGE_FILES_ARRAY[i]}\" "
              if ((i == 0)); then
                  FILTER_COMPLEX_STR="[0:v]"
              else
                  PREV_INDEX=$((i-1))
                  FILTER_COMPLEX_STR+="[${PREV_INDEX}v][${i}:v]xfade=transition=fade:duration=${CROSSFADE_DURATION}:offset=${CURRENT_OFFSET}[${i}v];"
              fi
              CURRENT_OFFSET=$(echo "scale=4; $CURRENT_OFFSET + $IMAGE_DURATION" | bc)
          done

          # Remove trailing semicolon and add final format
          FILTER_COMPLEX_STR=$(echo "$FILTER_COMPLEX_STR" | sed 's/;$//')
          FINAL_VIDEO_PATH="${{ needs.setup.outputs.folder-name }}/final_video.mp4"

          # The filtergraph needs to map to the last video stream.
          LAST_VIDEO_STREAM=""
          if ((NUM_IMAGES == 1)); then
              LAST_VIDEO_STREAM="[0:v]"
          else
              LAST_VIDEO_STREAM="[$((${NUM_IMAGES}-1))v]"
          fi

          # Add format and map to output
          FILTER_COMPLEX_STR+=";${LAST_VIDEO_STREAM}format=yuv420p[outv]"

          # Construct the full ffmpeg command
          FFMPEG_COMMAND="ffmpeg -y ${INPUT_FILES} -i \"${{ needs.setup.outputs.folder-name }}/music.wav\" -filter_complex \"${FILTER_COMPLEX_STR}\" -map \"[outv]\" -map ${NUM_IMAGES}:a -shortest \"$FINAL_VIDEO_PATH\""

          echo "Generated FFMPEG Command: $FFMPEG_COMMAND"
          eval "$FFMPEG_COMMAND" # Execute the command

          echo "final_video_path=$FINAL_VIDEO_PATH" >> $GITHUB_OUTPUT
      - name: Commit final video
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(video): 🎬 Assemble final music video"
          git push

  create-pr:
    runs-on: ubuntu-latest
    needs: [setup, assemble]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0 # 完全な履歴をフェッチして、最新のコミットを確実に取得
      - name: Debug Git Environment
        run: |
          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Git status:"
          git status
          echo "Git remotes:"
          git remote -v
          echo "Git config:"
          git config --list
      - name: Create Pull Request
        run: |
          PR_BODY=$(cat <<EOF
          🎵 **New AI-Generated Music Video is Ready!**

          This pull request contains the complete music video generated based on your request.
          ### Details
