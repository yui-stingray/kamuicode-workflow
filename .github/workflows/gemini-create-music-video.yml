name: Gemini-Native Create Music Video

on:
  workflow_dispatch:
    inputs:
      lyrics:
        description: '歌詞 (各行は改行で区切ってください)'
        required: true
        type: string
      style:
        description: '音楽と画像の全体的なスタイル (例: 水彩画風, アニメ, サイバーパンク)'
        required: true
        type: string
      tempo:
        description: '音楽のテンポ (例: スロー, 80 BPM, アップビート)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create unique branch and folder
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_STYLE=$(echo "${{ github.event.inputs.style }}" | sed 's/[^a-zA-Z0-9]/-/g')
          BRANCH_NAME="mv/${SAFE_STYLE}-${TIMESTAMP}"
          FOLDER_NAME="music-videos/${TIMESTAMP}-${SAFE_STYLE}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

  plan:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      plan-path: ${{ steps.parse-plan-output.outputs.plan_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "Bash(curl:*)",
                "Bash(wget:*)",
                "Bash(sleep:*)",
                "Bash(stat:*)",
                "Bash(find:*)",
                "Bash(ls:*)",
                "Bash(cat:*)",
                "Bash(head:*)",
                "Bash(mkdir:*)",
                "Bash(git:checkout:*)",
                "Bash(git:config:*)",
                "Bash(git:push:*)",
                "Bash(git:add:*)",
                "Bash(git:diff:*)",
                "Bash(git:commit:*)",
                "Bash(git:pull:*)",
                "Bash(date:*)",
                "Bash(jq:*)",
                "Bash(tr:*)",
                "Bash(wc:*)",
                "Bash(echo:*)",
                "Bash(npx:*)",
                "Bash(open:*)",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
                "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
                "mcp__r2v-fal-vidu_q1__vidu_q1_status",
                "mcp__r2v-fal-vidu_q1__vidu_q1_result",
                "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
                "mcp__t2v-fal-veo3-fast__veo3_fast_status",
                "mcp__t2v-fal-veo3-fast__veo3_fast_result",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
                "mcp__t2m-google-lyria__lyria_generate"
              ]
            },
            "coreTools": [
              "ReadFileTool",
              "WriteFileTool",
              "EditFileTool",
              "ShellTool",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
              "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
              "mcp__r2v-fal-vidu_q1__vidu_q1_status",
              "mcp__r2v-fal-vidu_q1__vidu_q1_result",
              "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
              "mcp__t2v-fal-veo3-fast__veo3_fast_status",
              "mcp__t2v-fal-veo3-fast__veo3_fast_result",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
              "mcp__t2m-google-lyria__lyria_generate"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Run Gemini Creative Director Agent
        id: gemini-plan
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたはミュージックビデオのクリエイティブディレクターAIです。
            提供された情報に基づき、詳細な制作計画を**単一のJSONオブジェクト**として出力してください。
            **入力:**
            - 歌詞: "${{ github.event.inputs.lyrics }}"
            - スタイル: "${{ github.event.inputs.style }}"
            - テンポ: "${{ github.event.inputs.tempo }}"
            **タスク:**
            1. 音楽生成(Lyria)用の詳細なプロンプトを作成してください。
            2. 歌詞を分析し、各行に対応する画像生成(Imagen)用の創造的なプロンプトを作成してください。
            3. 全ての計画を、以下の構造を持つJSONとして、`${{ needs.setup.outputs.folder-name }}/production_plan.json` ファイルに保存してください。
            **JSON構造:**
            ```json
            {
              "music_prompt": "A gentle, melancholic piano melody, slow tempo, with subtle string undertones, evoking a sense of nostalgic anime.",
              "scenes": [
                { "lyrics": "一番星、夜空に光る。", "image_prompt": "A breathtakingly beautiful anime-style illustration of a single, brilliant first star appearing in a deep indigo twilight sky." },
                { "lyrics": "君との思い出、心に灯る。", "image_prompt": "A warm, nostalgic anime scene. Two figures on a hill looking at the starry sky, a gentle light emanating from their hearts." }
              ]
            }
            ```
            **重要:** 必ず `production_plan.json` を作成し、その絶対パスを `plan_path` という名前で出力してください。
      - name: Parse plan output
        id: parse-plan-output
        run: |
          PLAN_PATH=$(echo "${{ steps.gemini-plan.outputs.gemini_result }}" | sed -n 's/.*plan_path: \(.*\)/\1/p')
          echo "plan_path=$PLAN_PATH" >> $GITHUB_OUTPUT
      - name: Commit production plan
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --exit-code; then
            git commit -m "feat(plan): 📋 Create music video production plan" || true
            git push || true
          else
            echo "No changes to commit in production plan."
          fi

  generate-assets:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    outputs:
      music-duration: ${{ steps.get-media-info.outputs.music_duration }}
      num-images: ${{ steps.get-media-info.outputs.num_images }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "Bash(curl:*)",
                "Bash(wget:*)",
                "Bash(sleep:*)",
                "Bash(stat:*)",
                "Bash(find:*)",
                "Bash(ls:*)",
                "Bash(cat:*)",
                "Bash(head:*)",
                "Bash(mkdir:*)",
                "Bash(git:checkout:*)",
                "Bash(git:config:*)",
                "Bash(git:push:*)",
                "Bash(git:add:*)",
                "Bash(git:diff:*)",
                "Bash(git:commit:*)",
                "Bash(git:pull:*)",
                "Bash(date:*)",
                "Bash(jq:*)",
                "Bash(tr:*)",
                "Bash(wc:*)",
                "Bash(echo:*)",
                "Bash(npx:*)",
                "Bash(open:*)",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
                "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
                "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
                "mcp__r2v-fal-vidu_q1__vidu_q1_status",
                "mcp__r2v-fal-vidu_q1__vidu_q1_result",
                "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
                "mcp__t2v-fal-veo3-fast__veo3_fast_status",
                "mcp__t2v-fal-veo3-fast__veo3_fast_result",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
                "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
                "mcp__t2m-google-lyria__lyria_generate"
              ]
            },
            "coreTools": [
              "ReadFileTool",
              "WriteFileTool",
              "EditFileTool",
              "ShellTool",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_submit",
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_status", 
              "mcp__t2i-fal-imagen4-ultra__imagen4_ultra_result",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_result",
              "mcp__r2v-fal-vidu-q1__vidu_q1_submit",
              "mcp__r2v-fal-vidu_q1__vidu_q1_status",
              "mcp__r2v-fal-vidu_q1__vidu_q1_result",
              "mcp__t2v-fal-veo3-fast__veo3_fast_submit",
              "mcp__t2v-fal-veo3-fast__veo3_fast_status",
              "mcp__t2v-fal-veo3-fast__veo3_fast_result",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_status",
              "mcp__i2v-fal-hailuo-02-pro__hailuo_02_result",
              "mcp__t2m-google-lyria__lyria_generate"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: Create music output directory
        run: mkdir -p ${{ needs.setup.outputs.folder-name }}/music
      - name: 🤖 Run Gemini Music Generation Agent
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Read the JSON file at `${{ needs.plan.outputs.plan-path }}`.
            Take the `music_prompt` value from the JSON.
            Use this prompt to generate music using the `mcp__t2m-google-lyria__lyria_generate` tool.
            Save the final audio file as `${{ needs.setup.outputs.folder-name }}/music/generated-music.wav`.
            If the API call fails, wait 10 seconds and retry up to 3 times.
      - name: Create image output directory
        run: mkdir -p ${{ needs.setup.outputs.folder-name }}/images
      - name: 🤖 Run Gemini Image Generation Agent
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Read the JSON file at `${{ needs.plan.outputs.plan-path }}`.
            For each scene in the `scenes` array:
            1. Take the `image_prompt` value.
            2. Use this prompt to generate an image using the `mcp__t2i-fal-imagen4-fast__imagen4_fast_submit` tool, poll for status, and download the result.
            3. Save the generated image sequentially, named `${{ needs.setup.outputs.folder-name }}/images/segment-${INDEX}.png`.
            If the API call fails, wait 10 seconds and retry up to 3 times.
      - name: Setup SoX
        run: sudo apt-get update && sudo apt-get install -y sox
      - name: Get music and image info
        id: get-media-info
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          MUSIC_FILE="${FOLDER_NAME}/music/generated-music.wav"
          NUM_IMAGES=$(find "${FOLDER_NAME}/images" -name "segment-*.png" | wc -l)
          MUSIC_DURATION=$(soxi -D "$MUSIC_FILE")

          echo "music_duration=$MUSIC_DURATION" >> $GITHUB_OUTPUT
          echo "num_images=$NUM_IMAGES" >> $GITHUB_OUTPUT
      - name: Commit generated assets
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"

          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          MUSIC_FILE="${FOLDER_NAME}/music/generated-music.wav"
          FIRST_IMAGE="${FOLDER_NAME}/images/segment-0.png"
          TIMEOUT=60 # seconds
          ELAPSED_TIME=0

          echo "Waiting for generated files to appear..."
          while [ ! -f "$MUSIC_FILE" ] || [ ! -f "$FIRST_IMAGE" ]; do
            if [ "$ELAPSED_TIME" -ge "$TIMEOUT" ]; then
              echo "Error: Timeout waiting for generated files."
              ls -lR "$FOLDER_NAME" || true # List contents for debugging
              exit 1
            fi
            echo "Files not found yet. Waiting 5 seconds..."
            sleep 5
            ELAPSED_TIME=$((ELAPSED_TIME + 5))
          done
          echo "Generated files found. Proceeding with commit."

          git add .
          if ! git diff --cached --exit-code; then
            git commit -m "feat(assets): 🎨 Generate music and image assets" || true
            git push || true
          else
            echo "No changes to commit in generated assets."
          fi

  generate-videos:
    runs-on: ubuntu-latest
    needs: [setup, generate-assets]
    outputs:
      video-files: ${{ steps.generate-video-segments.outputs.video_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Create video output directory
        run: mkdir -p ${{ needs.setup.outputs.folder-name }}/videos
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
