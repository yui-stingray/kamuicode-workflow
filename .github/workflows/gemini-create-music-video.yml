name: Gemini-Native Create Music Video

on:
  workflow_dispatch:
    inputs:
      lyrics:
        description: '
歌詞 (各行は改行で区切ってください)'
        required: true
        type: string
      style:
        description: '
音楽と画像の全体的なスタイル (例: 水彩画風, アニメ, サイバーパンク)'
        required: true
        type: string
      tempo:
        description: '
音楽のテンポ (例: スロー, 80 BPM, アップビート)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create unique branch and folder
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_STYLE=$(echo "${{ github.event.inputs.style }}" | sed 's/[^a-zA-Z0-9]/-/g')
          BRANCH_NAME="mv/${SAFE_STYLE}-${TIMESTAMP}"
          FOLDER_NAME="music-videos/${TIMESTAMP}-${SAFE_STYLE}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

  plan:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      plan-path: ${{ steps.gemini-plan.outputs.plan_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "Bash(mkdir:*)",
                "WriteFileTool"
              ]
            },
            "coreTools": [
              "WriteFileTool",
              "Bash"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Run Gemini Creative Director Agent
        id: gemini-plan
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            あなたはミュージックビデオのクリエイティブディレクターAIです。
            提供された情報に基づき、詳細な制作計画を**単一のJSONオブジェクト**として出力してください。
            **入力:**
            - 歌詞: "${{ github.event.inputs.lyrics }}"
            - スタイル: "${{ github.event.inputs.style }}"
            - テンポ: "${{ github.event.inputs.tempo }}"
            **タスク:**
            1. 音楽生成(Lyria)用の詳細なプロンプトを作成してください。
            2. 歌詞を分析し、各行に対応する画像生成(Imagen)用の創造的なプロンプトを作成してください。
            3. 全ての計画を、以下の構造を持つJSONとして、`${{ needs.setup.outputs.folder-name }}/production_plan.json` ファイルに保存してください。
            **JSON構造:**
            ```json
            {
              "music_prompt": "A gentle, melancholic piano melody, slow tempo, with subtle string undertones, evoking a sense of nostalgic anime.",
              "scenes": [
                { "lyrics": "一番星、夜空に光る。", "image_prompt": "A breathtakingly beautiful anime-style illustration of a single, brilliant first star appearing in a deep indigo twilight sky." },
                { "lyrics": "君との思い出、心に灯る。", "image_prompt": "A warm, nostalgic anime scene. Two figures on a hill looking at the starry sky, a gentle light emanating from their hearts." }
              ]
            }
            ```
            **重要:** 必ず `production_plan.json` を作成し、その絶対パスを `plan_path` という名前で出力してください。
      - name: Commit production plan
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(plan): 📋 Create music video production plan"
          git push

  generate-assets:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Create .gemini/settings.json
        run: |
          mkdir -p .gemini
          cat > .gemini/settings.json << EOF
          {
            "mcpServers": {
              "t2i-fal-imagen4-ultra": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_ULTRA_URL }}",
                "timeout": 300000
              },
              "t2i-fal-imagen4-fast": {
                "httpUrl": "${{ secrets.MCP_T2I_FAL_IMAGEN4_FAST_URL }}",
                "timeout": 300000
              },
              "r2v-fal-vidu-q1": {
                "httpUrl": "${{ secrets.MCP_R2V_FAL_VIDU_Q1_URL }}",
                "timeout": 300000
              },
              "t2v-fal-veo3-fast": {
                "httpUrl": "${{ secrets.MCP_T2V_FAL_VEO3_FAST_URL }}",
                "timeout": 300000
              },
              "i2v-fal-hailuo-02-pro": {
                "httpUrl": "${{ secrets.MCP_I2V_FAL_HAILUO_02_PRO_URL }}",
                "timeout": 300000
              },
              "t2m-google-lyria": {
                "httpUrl": "${{ secrets.MCP_T2M_GOOGLE_LYRIA_URL }}",
                "timeout": 300000
              }
            },
            "defaultMode": "acceptEdits",
            "permissions": {
              "allow": [
                "ReadFileTool",
                "WriteFileTool",
                "ShellTool",
                "mcp__t2m-google-lyria__lyria_generate",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
                "mcp__t2i-fal-imagen4-fast__imagen4_fast_result"
              ]
            },
            "coreTools": [
              "ReadFileTool",
              "WriteFileTool",
              "ShellTool",
              "mcp__t2m-google-lyria__lyria_generate",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_submit",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_status",
              "mcp__t2i-fal-imagen4-fast__imagen4_fast_result"
            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Run Gemini Music Generation Agent
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Read the JSON file at `${{ needs.plan.outputs.plan_path }}`.
            Take the `music_prompt` value from the JSON.
            Use this prompt to generate music using the `mcp__t2m-google-lyria__lyria_generate` tool.
            Save the final audio file as `${{ needs.setup.outputs.folder-name }}/music.wav`.
      - name: 🤖 Run Gemini Image Generation Agent
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Read the JSON file at `${{ needs.plan.outputs.plan_path }}`.
            For each scene in the `scenes` array:
            1. Take the `image_prompt` value.
            2. Use this prompt to generate an image using the `mcp__t2i-fal-imagen4-fast__imagen4_fast_submit` tool, poll for status, and download the result.
            3. Save the generated image sequentially, named `${{ needs.setup.outputs.folder-name }}/image_0.png`, `${{ needs.setup.outputs.folder-name }}/image_1.png`, and so on.
      - name: Commit generated assets
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(assets): 🎨 Generate music and image assets"
          git push

  assemble:
    runs-on: ubuntu-latest
    needs: [setup, generate-assets]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Setup FFmpeg and SoX
        run: sudo apt-get update && sudo apt-get install -y ffmpeg sox bc
      - name: Assemble Video
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          MUSIC_FILE=$(ls -1 "${FOLDER_NAME}"/*.wav | head -n 1)
          if [ -z "$MUSIC_FILE" ]; then
            echo "Error: Music file not found in ${FOLDER_NAME}"
            exit 1
          fi
          NUM_IMAGES=$(find "${FOLDER_NAME}" -name "image_*.png" | wc -l)
          if [ "$NUM_IMAGES" -eq 0 ]; then
            echo "Error: No images found in ${FOLDER_NAME}"
            exit 1
          fi
          MUSIC_DURATION=$(soxi -D "$MUSIC_FILE")
          IMAGE_DURATION=$(echo "scale=4; $MUSIC_DURATION / $NUM_IMAGES" | bc)
          CROSSFADE_DURATION=1

          FFMPEG_INPUTS=""
          IMAGE_FILES_ARRAY=($(find "${FOLDER_NAME}" -name "image_*.png" | sort -V))
          for img_file in "${IMAGE_FILES_ARRAY[@]}"; do
            FFMPEG_INPUTS+=" -loop 1 -t ${IMAGE_DURATION} -i \"$img_file\""
          done

          FILTER_COMPLEX=""
          for (( i=0; i<${NUM_IMAGES}; i++ )); do
            FILTER_COMPLEX+="[${i}:v]scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,setsar=1,format=yuv420p[v${i}];"
          done

          LAST_STREAM="v0"
          for (( i=1; i<${NUM_IMAGES}; i++ )); do
            OFFSET=$(echo "scale=4; ${i} * ${IMAGE_DURATION} - ${CROSSFADE_DURATION}" | bc)
            if [ $i -eq 1 ]; then
              INPUT_STREAM="v0"
            else
              prev=$((i-1))
              INPUT_STREAM="f${prev}"
            fi
            FILTER_COMPLEX+="[${INPUT_STREAM}][v${i}]xfade=transition=fade:duration=${CROSSFADE_DURATION}:offset=${OFFSET}[f${i}];"
            LAST_STREAM="f${i}"
          done

          FINAL_VIDEO_PATH="${FOLDER_NAME}/final_video.mp4"
          FFMPEG_COMMAND="ffmpeg -y ${FFMPEG_INPUTS} -i \"${MUSIC_FILE}\" -filter_complex \"${FILTER_COMPLEX}[${LAST_STREAM}]format=yuv420p[outv]\" -map \"[outv]\" -map ${NUM_IMAGES}:a -shortest \"${FINAL_VIDEO_PATH}\""
          
          echo "Running FFmpeg command..."
          eval $FFMPEG_COMMAND

      - name: Commit final video
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(video): 🎬 Assemble final music video"
          git push

  create-pr:
    runs-on: ubuntu-latest
    needs: [setup, assemble]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Create Pull Request
        run: |
          PR_BODY=$(cat <<EOF
          🎵 **New AI-Generated Music Video is Ready!**

          This pull request contains the complete music video generated based on your request.
          ### Details
          - **Style:** ${{ github.event.inputs.style }}
          - **Tempo:** ${{ github.event.inputs.tempo }}
          ### Lyrics
          > ${{ github.event.inputs.lyrics }}
          Please review the generated files in the `${{ needs.setup.outputs.folder-name }}` directory.
          EOF
          )
          gh pr create \
            --title "🎵 New Music Video: ${{ github.event.inputs.style }}" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ needs.setup.outputs.branch-name }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}