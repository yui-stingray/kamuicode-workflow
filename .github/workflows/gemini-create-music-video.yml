name: "Gemini Native Create Music Video"

on:
  workflow_dispatch:
    inputs:
      lyrics:
        description: 'Lyrics (separate each line with a newline)'
        required: true
        type: string
      style:
        description: 'Overall style for music and images (e.g., watercolor, anime, cyberpunk)'
        required: true
        type: string
        default: 'anime'
      tempo:
        description: 'Music tempo (e.g., slow, 80 BPM, upbeat)'
        required: true
        type: string
        default: '80 BPM'

permissions:
  contents: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch-name: ${{ steps.setup.outputs.branch-name }}
      folder-name: ${{ steps.setup.outputs.folder-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create unique branch
        id: setup
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SAFE_STYLE=$(echo "${{ github.event.inputs.style }}" | sed 's/[^a-zA-Z0-9]/-/g')
          BRANCH_NAME="mv/${SAFE_STYLE}-${TIMESTAMP}"
          FOLDER_NAME="music-videos/${TIMESTAMP}-${SAFE_STYLE}"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "folder-name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create and push branch
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

  plan:
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      plan_file_path: ${{ steps.plan.outputs.plan_file_path }}
      scenes_json: ${{ steps.plan.outputs.scenes_json }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g @google/gemini-cli@latest

      - name: 1. Generate Production Plan
        id: plan
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          mkdir -p "$FOLDER_NAME"
          PLAN_FILE_PATH="$FOLDER_NAME/production_plan.json"

          # Verify API key is set (without displaying it)
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY is not set"
            exit 1
          fi
          echo "API key is configured ✓"

          # Create prompt with safe variable substitution
          LYRICS_SAFE="${{ github.event.inputs.lyrics }}"
          STYLE_SAFE="${{ github.event.inputs.style }}"
          TEMPO_SAFE="${{ github.event.inputs.tempo }}"
          
          # Create prompt file (not logged)
          PROMPT_FILE=$(mktemp)
          cat > "$PROMPT_FILE" <<EOF
          You are a Music Video Creative Director AI.
          Based on the provided information, create a detailed production plan as a single JSON object. Do not output any text other than the JSON object.
          **Input:**
          - Lyrics: "$LYRICS_SAFE"
          - Style: "$STYLE_SAFE"
          - Tempo: "$TEMPO_SAFE"
          **Task:**
          1. Create a detailed prompt for music generation (Lyria).
          2. Analyze the lyrics and create creative prompts for image generation (Imagen) for each line.
          **JSON Structure:**
          {
            "music_prompt": "A gentle, melancholic piano melody, slow tempo, with subtle string undertones, evoking a sense of nostalgic anime.",
            "scenes": [
              { "index": 0, "lyrics": "First star, shining in the night sky.", "image_prompt": "A breathtakingly beautiful anime-style illustration of a single, brilliant first star appearing in a deep indigo twilight sky." },
              { "index": 1, "lyrics": "Memories with you, lighting up my heart.", "image_prompt": "A warm, nostalgic anime scene. Two figures on a hill looking at the starry sky, a gentle light emanating from their hearts." }
            ]
          }
          EOF
          
          echo "Calling Gemini API..."
          
          # Call Gemini API with prompt file (avoid logging sensitive data)
          GEMINI_OUTPUT_FILE=$(mktemp)
          if gemini --prompt-file "$PROMPT_FILE" > "$GEMINI_OUTPUT_FILE" 2>&1; then
            echo "Gemini API call successful ✓"
          else
            echo "::warning::Gemini API call failed, using fallback plan"
          fi
          
          # Clean up prompt file immediately
          rm -f "$PROMPT_FILE"
          
          # Extract JSON from output (without logging full response)
          if [ -s "$GEMINI_OUTPUT_FILE" ]; then
            sed -n '/```json/,/```/p' "$GEMINI_OUTPUT_FILE" | sed '1d;$d' > "$PLAN_FILE_PATH"
            
            # If that didn't work, try to extract JSON without code blocks
            if [ ! -s "$PLAN_FILE_PATH" ]; then
              echo "No JSON code block found, trying direct extraction..."
              jq . "$GEMINI_OUTPUT_FILE" > "$PLAN_FILE_PATH" 2>/dev/null || true
            fi
          fi
          
          # Clean up output file
          rm -f "$GEMINI_OUTPUT_FILE"
          
          # If still no valid JSON, create a fallback plan
          if [ ! -s "$PLAN_FILE_PATH" ] || ! jq . "$PLAN_FILE_PATH" > /dev/null 2>&1; then
            echo "Creating fallback plan..."
            cat > "$PLAN_FILE_PATH" <<EOF
          {
            "music_prompt": "A $TEMPO_SAFE $STYLE_SAFE style instrumental track with atmospheric sounds and emotional depth",
            "scenes": [
              {
                "index": 0,
                "lyrics": "Opening scene",
                "image_prompt": "A beautiful $STYLE_SAFE style illustration representing the opening of the music video"
              },
              {
                "index": 1,
                "lyrics": "Continuing scene", 
                "image_prompt": "A stunning $STYLE_SAFE style scene continuing the visual narrative"
              }
            ]
          }
          EOF
          fi

          echo "Plan file created successfully ✓"
          
          # Validate JSON (show structure but not content)
          if jq . "$PLAN_FILE_PATH" > /dev/null 2>&1; then
            echo "JSON validation passed ✓"
            SCENE_COUNT=$(jq '.scenes | length' "$PLAN_FILE_PATH")
            echo "Generated $SCENE_COUNT scenes"
          else
            echo "::error::Generated plan is not valid JSON!"
            exit 1
          fi
          
          SCENES_JSON=$(jq -c .scenes "$PLAN_FILE_PATH")
          if [ "$SCENES_JSON" = "null" ] || [ -z "$SCENES_JSON" ]; then
            echo "::error::No scenes found in plan!"
            exit 1
          fi
          
          echo "plan_file_path=$PLAN_FILE_PATH" >> $GITHUB_OUTPUT
          echo "scenes_json=$SCENES_JSON" >> $GITHUB_OUTPUT

      - name: Debug Git Status
        run: |
          echo "Current branch:"
          git branch -a
          echo "Git status:"
          git status
          echo "Checking folder structure:"
          ls -la ${{ needs.setup.outputs.folder-name }}/ || echo "Folder not found"
          # Do not display file contents to avoid logging sensitive data

      - name: Commit and Push Plan
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if the file exists
          PLAN_FILE="${{ needs.setup.outputs.folder-name }}/production_plan.json"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "::error::Plan file not found at $PLAN_FILE"
            exit 1
          fi
          
          # Force add the file even if it's in .gitignore
          git add -f "$PLAN_FILE"
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "::warning::Production plan file was not staged properly"
            
            # Debug: Check .gitignore patterns
            echo "Checking .gitignore patterns that might affect this file:"
            git check-ignore -v "$PLAN_FILE" || echo "File is not ignored by .gitignore"
            
            # Try alternative approach: commit all files in the folder
            git add -f ${{ needs.setup.outputs.folder-name }}/
            
            if git diff --staged --quiet; then
              echo "::error::Still no changes to commit after force add"
              exit 1
            fi
          fi
          
          echo "Changes detected, committing..."
          git commit -m "feat: Create music video production plan"
          git push origin ${{ needs.setup.outputs.branch-name }}
          echo "Plan committed and pushed successfully ✓"

  music:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    outputs:
      music_file_path: ${{ steps.music.outputs.music_file_path }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
      
      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g @google/gemini-cli@latest

      - name: 2. Generate Music
        id: music
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          PLAN_FILE_PATH="${{ needs.plan.outputs.plan_file_path }}"
          
          # Verify files exist without displaying content
          if [ ! -f "$PLAN_FILE_PATH" ]; then
            echo "::error::Plan file not found at $PLAN_FILE_PATH"
            exit 1
          fi
          
          MUSIC_PROMPT=$(jq -r '.music_prompt' "$PLAN_FILE_PATH")
          if [ "$MUSIC_PROMPT" = "null" ] || [ -z "$MUSIC_PROMPT" ]; then
            echo "::error::No music prompt found in plan"
            exit 1
          fi
          
          MUSIC_DIR="$FOLDER_NAME/music"
          mkdir -p "$MUSIC_DIR"
          
          echo "Generating music..."
          
          # Create temporary prompt file for security
          PROMPT_FILE=$(mktemp)
          echo "$MUSIC_PROMPT" > "$PROMPT_FILE"
          
          if gemini lyria generate --prompt-file "$PROMPT_FILE" --output_directory "$MUSIC_DIR"; then
            echo "Music generation successful ✓"
          else
            echo "::error::Music generation failed"
            rm -f "$PROMPT_FILE"
            exit 1
          fi
          
          # Clean up prompt file
          rm -f "$PROMPT_FILE"

          MUSIC_FILE_PATH=$(find "$MUSIC_DIR" -name "*.wav" -o -name "*.mp3" | head -n 1)
          
          if [ -z "$MUSIC_FILE_PATH" ]; then
            echo "::error::Music file not found after generation."
            exit 1
          fi
          
          echo "Music generated at: $(basename "$MUSIC_FILE_PATH") ✓"
          echo "music_file_path=$MUSIC_FILE_PATH" >> $GITHUB_OUTPUT

      - name: Commit and Push Music
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add all files in the music folder
          git add -f ${{ needs.setup.outputs.folder-name }}/music/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate music for video"
            git push origin ${{ needs.setup.outputs.branch-name }}
            echo "Music committed and pushed successfully ✓"
          else
            echo "::warning::No music files to commit"
          fi

  images:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    strategy:
      matrix:
        scene: ${{ fromJson(needs.plan.outputs.scenes_json) }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Tools
        run: npm install -g @google/gemini-cli@latest

      - name: 3. Generate Image for Scene ${{ matrix.scene.index }}
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          IMAGE_DIR="$FOLDER_NAME/images"
          mkdir -p "$IMAGE_DIR"
          
          INDEX=${{ matrix.scene.index }}
          PROMPT="${{ matrix.scene.image_prompt }}"
          IMAGE_PATH="$IMAGE_DIR/segment-$INDEX.png"
          
          echo "Generating image $INDEX..."
          
          # Create temporary prompt file for security
          PROMPT_FILE=$(mktemp)
          echo "$PROMPT" > "$PROMPT_FILE"
          
          if gemini imagen generate --prompt-file "$PROMPT_FILE" --output "$IMAGE_PATH"; then
            echo "Image $INDEX generation successful ✓"
          else
            echo "::error::Image $INDEX generation failed"
            rm -f "$PROMPT_FILE"
            exit 1
          fi
          
          # Clean up prompt file
          rm -f "$PROMPT_FILE"

          if [ ! -s "$IMAGE_PATH" ]; then
            echo "::error::Image file $IMAGE_PATH is empty!"
            exit 1
          fi
          echo "Image $INDEX generated successfully ✓"

      - name: Commit and Push Image ${{ matrix.scene.index }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add the specific image file
          git add -f ${{ needs.setup.outputs.folder-name }}/images/segment-${{ matrix.scene.index }}.png
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate image for scene ${{ matrix.scene.index }}"
            git push origin ${{ needs.setup.outputs.branch-name }}
            echo "Image ${{ matrix.scene.index }} committed and pushed successfully ✓"
          else
            echo "::warning::No image file to commit for scene ${{ matrix.scene.index }}"
          fi

  videos:
    runs-on: ubuntu-latest
    needs: [setup, plan, images]
    strategy:
      matrix:
        scene: ${{ fromJson(needs.plan.outputs.scenes_json) }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup Tools
        run: npm install -g @google/gemini-cli@latest

      - name: 4. Generate Video for Scene ${{ matrix.scene.index }}
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          INDEX=${{ matrix.scene.index }}
          PROMPT="${{ matrix.scene.image_prompt }}"
          IMAGE_FILE_PATH="$FOLDER_NAME/images/segment-$INDEX.png"
          VIDEO_DIR="$FOLDER_NAME/videos"
          VIDEO_PATH="$VIDEO_DIR/segment-$INDEX.mp4"
          mkdir -p "$VIDEO_DIR"

          # The image is now committed, so the URL is valid.
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ needs.setup.outputs.branch-name }}/$IMAGE_FILE_PATH"
          
          echo "Generating video $INDEX..."
          
          # Create temporary prompt file for security
          PROMPT_FILE=$(mktemp)
          echo "$PROMPT" > "$PROMPT_FILE"
          
          # Using hailuo which requires polling
          REQUEST_ID=$(gemini hailuo submit --image_url "$IMAGE_URL" --prompt-file "$PROMPT_FILE" | jq -r .request_id)
          
          # Clean up prompt file immediately
          rm -f "$PROMPT_FILE"

          if [ -z "$REQUEST_ID" ] || [ "$REQUEST_ID" = "null" ]; then
            echo "::error::Failed to submit video generation request."
            exit 1
          fi

          echo "Video generation request submitted with ID: $REQUEST_ID"

          # Poll for completion
          for i in {1..15}; do
            STATUS=$(gemini hailuo status --request_id "$REQUEST_ID" | jq -r .status)
            echo "Current status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              gemini hailuo result --request_id "$REQUEST_ID" --output_directory "$VIDEO_DIR" --filename "segment-$INDEX.mp4"
              break
            elif [ "$STATUS" == "failed" ]; then
              echo "::error::Video generation failed."
              exit 1
            fi
            sleep 30
          done

          if [ ! -s "$VIDEO_PATH" ]; then
            echo "::error::Video file $VIDEO_PATH is empty!"
            exit 1
          fi
          echo "Video $INDEX generated successfully ✓"

      - name: Commit and Push Video ${{ matrix.scene.index }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add the specific video file
          git add -f ${{ needs.setup.outputs.folder-name }}/videos/segment-${{ matrix.scene.index }}.mp4
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Generate video for scene ${{ matrix.scene.index }}"
            git push origin ${{ needs.setup.outputs.branch-name }}
            echo "Video ${{ matrix.scene.index }} committed and pushed successfully ✓"
          else
            echo "::warning::No video file to commit for scene ${{ matrix.scene.index }}"
          fi

  assemble:
    runs-on: ubuntu-latest
    needs: [setup, music, videos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Setup FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 5. Assemble Final Video
        id: assemble
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          MUSIC_FILE_PATH="${{ needs.music.outputs.music_file_path }}"
          VIDEO_DIR="$FOLDER_NAME/videos"
          FINAL_DIR="$FOLDER_NAME/final"
          FINAL_VIDEO_PATH="$FINAL_DIR/final-music-video.mp4"
          mkdir -p "$FINAL_DIR"

          # Create a list of video files for concatenation
          find "$VIDEO_DIR" -name "segment-*.mp4" | sort -V | sed "s/^/file '/" | sed "s/$/'/" > "$VIDEO_DIR/concat_list.txt"

          echo "Concatenation list:"
          cat "$VIDEO_DIR/concat_list.txt"

          # Concatenate videos
          ffmpeg -y -f concat -safe 0 -i "$VIDEO_DIR/concat_list.txt" -c copy "$VIDEO_DIR/concatenated.mp4"

          # Add music
          ffmpeg -y -i "$VIDEO_DIR/concatenated.mp4" -i "$MUSIC_FILE_PATH" -c:v copy -c:a aac -b:a 192k -shortest "$FINAL_VIDEO_PATH"
          
          echo "Final video assembled at $FINAL_VIDEO_PATH"
          echo "final_video_path=$FINAL_VIDEO_PATH" >> $GITHUB_OUTPUT

      - name: Commit and Push Final Video
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add all final video files
          git add -f ${{ needs.setup.outputs.folder-name }}/final/
          git add -f ${{ needs.setup.outputs.folder-name }}/videos/
          
          if ! git diff --staged --quiet; then
            git commit -m "feat: Assemble final music video"
            git push origin ${{ needs.setup.outputs.branch-name }}
            echo "Final video committed and pushed successfully ✓"
          else
            echo "::warning::No final video files to commit"
          fi

  create-pr:
    runs-on: ubuntu-latest
    needs: [setup, assemble]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ needs.setup.outputs.branch-name }}
        run: |
          PR_BODY=$(cat <<EOF
          🎵 **New AI-Generated Music Video is Ready!**

          This pull request contains the complete music video generated based on your request.
          ### Details
          - **Style:** ${{ github.event.inputs.style }}
          - **Tempo:** ${{ github.event.inputs.tempo }}
          ### Lyrics
          > ${{ github.event.inputs.lyrics }}
          Please review the generated files in the \`${{ needs.setup.outputs.folder-name }}\` directory.
          EOF
          )
          gh pr create \
            --title "🎵 New Music Video: ${{ github.event.inputs.style }}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME"
