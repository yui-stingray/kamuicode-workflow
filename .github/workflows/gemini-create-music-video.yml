            ],
            "auth": {
              "apiKey": "${{ secrets.GEMINI_API_KEY }}"
            }
          }
          EOF
      - name: 🤖 Generate Video Segments
        id: generate-video-segments
        uses: google-gemini/gemini-cli-action@main
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Read the JSON file at `${{ needs.plan.outputs.plan-path }}`.
            The music duration is `${{ needs.generate-assets.outputs.music-duration }}` seconds.
            The number of images generated is `${{ needs.generate-assets.outputs.num-images }}`.
            The base path for the images is `${{ needs.setup.outputs.folder-name }}/images`.
            The repository is `${{ github.repository }}` and the branch is `${{ needs.setup.outputs.branch-name }}`.

            For each image from index 0 to (num_images - 1):
            1. The local image path is `${base_path}/segment-${INDEX}.png`.
            2. Construct the public URL for the image: `https://raw.githubusercontent.com/${repository}/${branch}/${local_image_path}`.
            3. Read the `production_plan.json` file and get the `image_prompt` from the `scenes` array at the current index.
            4. Use the `mcp__i2v-fal-hailuo-02-pro__hailuo_02_submit` tool to generate a video. Use the public URL as `image_url` and the `image_prompt` as the `prompt`.
            5. Save the generated video sequentially, named `${{ needs.setup.outputs.folder-name }}/videos/segment-${INDEX}.mp4`.
            6. If the API call fails, wait 10 seconds and retry up to 3 times.

            After generating all video segments, output a JSON array of the absolute paths to the generated video files.

            **Output JSON Structure:**
            ```json
            [
              "music-videos/YYYYMMDD-HHMMSS-STYLE/videos/segment-0.mp4",
              "music-videos/YYYYMMDD-HHMMSS-STYLE/videos/segment-1.mp4"
            ]
            ```
      - name: Commit generated videos
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"

          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          FIRST_VIDEO="${FOLDER_NAME}/videos/segment-0.mp4"
          TIMEOUT=180 # seconds (longer timeout for video generation)
          ELAPSED_TIME=0

          echo "Waiting for generated video files to appear..."
          while [ ! -f "$FIRST_VIDEO" ]; do
            if [ "$ELAPSED_TIME" -ge "$TIMEOUT" ]; then
              echo "Error: Timeout waiting for generated video files."
              ls -lR "$FOLDER_NAME/videos" || true # List contents for debugging
              exit 1
            fi
            echo "Video files not found yet. Waiting 10 seconds..."
            sleep 10
            ELAPSED_TIME=$((ELAPSED_TIME + 10))
          done
          echo "Generated video files found. Proceeding with commit."

          git add .
          if ! git diff --cached --exit-code; then
            git commit -m "feat(videos): 🎬 Generate video segments" || true
            git push || true
          else
            echo "No changes to commit in generated videos."
          fi

  assemble:
    runs-on: ubuntu-latest
    needs: [setup, generate-videos]
    outputs:
      final-video-path: ${{ steps.assemble-video.outputs.final_video_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch-name }}
          fetch-depth: 0
      - name: Setup FFmpeg and SoX
        run: sudo apt-get update && sudo apt-get install -y ffmpeg sox bc
      - name: Assemble Video
        id: assemble-video
        run: |
          FOLDER_NAME="${{ needs.setup.outputs.folder-name }}"
          MUSIC_FILE="${FOLDER_NAME}/music/generated-music.wav"
          VIDEO_FILES_JSON="${{ needs.generate-videos.outputs.video-files }}"

          if [ -z "$MUSIC_FILE" ]; then
            echo "Error: Music file not found in ${FOLDER_NAME}/music/generated-music.wav"
            exit 1
          fi

          if [ -z "$VIDEO_FILES_JSON" ] || [ "$(echo "$VIDEO_FILES_JSON" | jq 'length')" -eq 0 ]; then
            echo "Error: No video files found."
            exit 1
          }

          # Get music duration
          MUSIC_DURATION=$(soxi -D "$MUSIC_FILE")

          # Create concat list for FFmpeg
          CONCAT_LIST="${FOLDER_NAME}/videos/concat_list.txt"
          echo "$VIDEO_FILES_JSON" | jq -r '.[]' | while read -r video_file; do
            echo "file '$video_file'" >> "$CONCAT_LIST"
          done

          # Concatenate videos
          CONCAT_VIDEO="${FOLDER_NAME}/videos/concatenated_video.mp4"
          ffmpeg -y -f concat -safe 0 -i "$CONCAT_LIST" -c copy "$CONCAT_VIDEO"

          # Trim or loop video to match music duration
          FINAL_VIDEO_PATH="${FOLDER_NAME}/final/final-music-video.mp4"
          ffmpeg -y -i "$CONCAT_VIDEO" -i "$MUSIC_FILE" -map 0:v -map 1:a -c:v copy -c:a aac -b:a 192k -shortest "$FINAL_VIDEO_PATH"

          echo "final_video_path=$FINAL_VIDEO_PATH" >> $GITHUB_OUTPUT

      - name: Commit final video
        run: |
          git config --global user.name "gemini-agent[bot]"
          git config --global user.email "gemini-agent[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --exit-code; then
            git commit -m "feat(video): 🎬 Assemble final music video" || true
            git push || true
          else
            echo "No changes to commit in final video."
          fi

  create-pr:
    runs-on: ubuntu-latest
    needs: [setup, assemble]
    steps:
      - name: Create Pull Request
        run: |
          PR_BODY=$(cat <<EOF
          🎵 **New AI-Generated Music Video is Ready!**

          This pull request contains the complete music video generated based on your request.
          ### Details
          - **Style:** ${{ github.event.inputs.style }}
          - **Tempo:** ${{ github.event.inputs.tempo }}
          ### Lyrics
          > ${{ github.event.inputs.lyrics }}
          Please review the generated files in the `${{ needs.setup.outputs.folder-name }}` directory.
          EOF
          )
          gh pr create \
            --title "🎵 New Music Video: ${{ github.event.inputs.style }}" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ needs.setup.outputs.branch-name }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}