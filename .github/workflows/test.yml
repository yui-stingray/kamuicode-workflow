name: Test Workflow

on:
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input'
        required: true
        type: string
        default: 'Hello'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test step
        run: echo "Test successful with input: ${{ github.event.inputs.test_input }}"
