name: Music Video Creator

on:
  workflow_dispatch:
    inputs:
      music_concept:
        description: 'Music concept'
        required: true
        type: string
        default: 'Cyberpunk city night'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: echo "Music concept: ${{ github.event.inputs.music_concept }}"
